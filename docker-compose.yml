services:
  # ─── PostgreSQL Database ───────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: medconnect_db
    environment:
      POSTGRES_USER: ${DB_USER:-medadmin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-securepass123}
      POSTGRES_DB: medconnect
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./deployments/postgres:/docker-entrypoint-initdb.d
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U medadmin -d medconnect" ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── Ollama Local AI Inference ─────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: medconnect_ai
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    restart: unless-stopped
    # Uncomment for NVIDIA GPU acceleration:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

    # ─── Evolution API v1 (WhatsApp Gateway) ───
  evolution-api:
    image: atendai/evolution-api:v1.6.0
    container_name: medconnect_evolution_api
    environment:
      - SERVER_TYPE=http
      - SERVER_PORT=8080
      - AUTH_API_KEY=secret-whatsapp-token
      - AUTHENTICATION_API_KEY=secret-whatsapp-token
      - INTERNAL_API_KEY=secret-whatsapp-token
      - DATABASE_ENABLED=false
      - CONFIG_SESSION_PHONE_CLIENT=MedConnect
      - WEBHOOK_GLOBAL_ENABLED=false
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - medconnect-network

  # ─── Go Backend API ────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: medconnect_backend
    environment:
      - DB_DSN=host=postgres user=${DB_USER:-medadmin} password=${DB_PASSWORD:-securepass123} dbname=medconnect port=5432 sslmode=disable
      - AES_ENCRYPTION_KEY=${AES_KEY}
      - JWT_SECRET=${JWT_SECRET:-medconnect-jwt-secret-2026}
      - OLLAMA_URL=http://ollama:11434
      - SERVER_PORT=3000
      - WA_URL=http://evolution-api:8080
      - WA_TOKEN=${WA_TOKEN:-evolution-secret-key}
      - WA_INSTANCE=${WA_INSTANCE:-medconnect}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
      evolution-api:
        condition: service_started
    restart: unless-stopped
    networks:
      - medconnect-network

networks:
  medconnect-network:
    driver: bridge

volumes:
  pgdata:
    driver: local
  ollama_models:
    driver: local
